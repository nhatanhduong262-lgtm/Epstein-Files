    <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giới thiệu bản thân</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#1a1a1a;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:80%;
    margin:auto;
    background:white;
    padding:20px;
    margin-top:30px;
    border-radius:8px;
}

.profile{
    display:flex;
    align-items:center;
    gap:30px;
}

.profile img{
    width:250px;
    border-radius:10px;
}

.info{
    flex:1;
}

.info h2{
    margin-top:0;
}

ul{
    padding-left:20px;
}

</style>
</head>

<body>

<header>
    <h1>Trang giới thiệu bản thân</h1>
</header>

<div class="container">

<div class="profile">

    <!-- Hình ảnh bên trái -->
    <img src="https://cdn-media.sforum.vn/storage/app/media/ctvseo_maihue/hinh-nen-gau-truc/hinh-nen-gau-truc-1.jpg" alt="Ảnh đại diện">

    <!-- Phần giới thiệu bên phải -->
    <div class="info">

        <h2>Thông tin cá nhân</h2>

        <p><b>Tên:</b> Phạm Tiến Doanh</p>
        <p><b>Ngày sinh:</b> 01/01/2000</p>

        <p><b>Sở thích:</b></p>
        <ul>
            <li>Chơi game</li>
        </ul>

    </div>

</div>

</div>

</body>

</body>
